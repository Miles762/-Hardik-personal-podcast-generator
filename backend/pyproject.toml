[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
pythonpath = ["."]

[tool.mypy]
python_version = "3.12"
plugins = ["pydantic.mypy"]
ignore_missing_imports = true
# PRD 11.4: default mypy profile on the backend (not --strict).

[tool.ruff]
line-length = 100
target-version = "py312"
# Autogenerated migrations are not hand-formatted.
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
# B008: FastAPI's Depends()/Query() in argument defaults is the framework's
# idiomatic DI pattern, not a bug. Standard suppression for FastAPI projects.
ignore = ["B008"]

[tool.ruff.lint.per-file-ignores]
# Tests favor readable, wide assertion lines over strict wrapping.
"tests/*" = ["E501"]
