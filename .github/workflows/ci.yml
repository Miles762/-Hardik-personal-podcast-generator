# CI (PRD 11.5): one workflow runs backend lint/type/tests and frontend
# type/lint/tests. Externals are mocked, so CI spends no API credits.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system deps (ffmpeg)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install Python deps
        run: pip install -r requirements-dev.txt
      - name: Ruff (lint)
        run: ruff check .
      - name: Mypy (types)
        run: mypy app
      - name: Pytest
        run: pytest -q
        env:
          ENABLE_SCHEDULER: "false"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install deps
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Vitest
        run: npm run test
